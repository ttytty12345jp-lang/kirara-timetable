name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      
      - run: npm ci
      
      - name: Build with environment variables
        env:
          VITE_SUPABASE_URL: https://ddzpylceuerwnnbiefrd.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkenB5bGNldWVyd25uYmllZnJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0ODExNzQsImV4cCI6MjA5NTA1NzE3NH0.n4uNxYr8gykoz6nbJnWoBbypvkq5RMZkrH6GWr4mEhwnpm
        run: npm run build
      
      - uses: actions/configure-pages@v4
      
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      
      - uses: actions/deploy-pages@v4
        id: deployment